<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Roblox Login</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #000;
overflow: hidden;
}

/* BACKGROUND */
.bg {
position: fixed;
width: 100%;
height: 100%;
z-index: -2;
}

.bg img {
position: absolute;
width: 220px;
border-radius: 14px;
transform: rotate(-15deg);
opacity: 0.9;
}

.bg img:nth-child(1){ top:10%; left:10%;}
.bg img:nth-child(2){ top:20%; right:15%; transform: rotate(12deg);}
.bg img:nth-child(3){ bottom:15%; left:20%;}
.bg img:nth-child(4){ bottom:10%; right:10%;}
.bg img:nth-child(5){ top:50%; left:45%; transform: rotate(8deg);}

/* OVERLAY */
.overlay {
position: fixed;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.75);
backdrop-filter: blur(6px);
z-index: -1;
}

/* TOPBAR */
.topbar {
position: fixed;
top: 0;
width: 100%;
height: 48px;
background: rgba(20,20,20,0.95);
display: flex;
align-items: center;
padding: 0 20px;
color: white;
}

/* LOGO */
.logo {
width: 28px;
margin-right: 15px;
cursor: pointer;
filter: invert(1);
}

/* NAV */
.topbar-left {
display: flex;
gap: 20px;
align-items: center;
}

.topbar-left span {
color: #bbb;
cursor: pointer;
}

.topbar-left span:hover {
color: white;
}

.topbar-center {
position: absolute;
left: 50%;
transform: translateX(-50%);
}

.search {
background: #2a2a2a;
border: none;
padding: 7px 14px;
border-radius: 20px;
color: white;
width: 260px;
}

.topbar-right {
margin-left: auto;
display: flex;
gap: 10px;
}

.btn-blue {
background: #3b82f6;
color: white;
border: none;
padding: 6px 14px;
border-radius: 6px;
cursor: pointer;
}

.btn-dark {
background: transparent;
border: 1px solid #555;
color: white;
padding: 6px 14px;
border-radius: 6px;
cursor: pointer;
}

/* LOGIN BOX */
.container {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: rgba(35,35,35,0.95);
padding: 30px;
width: 360px;
border-radius: 10px;
text-align: left;
color: white;
box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* TITLE */
h1 {
font-size: 30px;
font-weight: 800;
margin-bottom: 18px;
color: #e5e7eb;
letter-spacing: -0.5px;
}

input {
width: 100%;
padding: 12px;
margin: 8px 0;
background: #2a2a2a;
border: 1px solid #444;
border-radius: 8px;
color: white;
}

button {
width: 100%;
padding: 12px;
margin-top: 10px;
border-radius: 8px;
background: transparent;
border: 1px solid #555;
color: white;
cursor: pointer;
}

button:hover {
background: #3a3a3a;
}

.link {
margin-top: 12px;
font-size: 13px;
color: #aaa;
cursor: pointer;
}

.divider {
display: flex;
align-items: center;
margin: 20px 0;
font-size: 12px;
color: #888;
}

.divider::before,
.divider::after {
content: "";
flex: 1;
border-bottom: 1px solid #444;
margin: 0 10px;
}

.signup {
margin-top: 15px;
font-size: 14px;
color: #bbb;
}

.signup span {
color: white;
font-weight: bold;
cursor: pointer;
}

#error, #msg {
color: #ff4d4d;
margin-top: 10px;
display: none;
font-size: 13px;
}

/* RELOAD OVERLAY */
#reloadOverlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: black;
opacity: 0;
pointer-events: none;
transition: opacity 0.4s ease;
z-index: 9999;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
<img src="https://picsum.photos/300/300?1">
<img src="https://picsum.photos/300/300?2">
<img src="https://picsum.photos/300/300?3">
<img src="https://picsum.photos/300/300?4">
<img src="https://picsum.photos/300/300?5">
</div>

<div class="overlay"></div>

<!-- TOPBAR -->
<div class="topbar">

<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.svg"
class="logo"
onclick="reloadWithTransition()">

<div class="topbar-left">
<span onclick="reloadWithTransition()">Descubrir</span>
<span onclick="reloadWithTransition()">Mercado</span>
<span onclick="reloadWithTransition()">Crear</span>
<span onclick="reloadWithTransition()">Robux</span>
</div>

<div class="topbar-center">
<input class="search" placeholder="Buscar">
</div>

<div class="topbar-right">
<button class="btn-blue" onclick="reloadWithTransition()">Registro</button>
<button class="btn-dark" onclick="reloadWithTransition()">Iniciar sesión</button>
</div>

</div>

<!-- LOGIN -->
<div class="container">

<h1>Iniciar sesión en Roblox</h1>

<input type="text" placeholder="Usuario/correo/teléfono">
<input type="password" placeholder="Contraseña">

<button onclick="login()">Iniciar sesión</button>

<p id="error">Datos incorrectos</p>

<div class="link">¿Olvidaste la contraseña o el usuario?</div>

<div class="divider">o</div>

<button onclick="showMessage()">Envíame un código de un solo uso</button>
<button onclick="showMessage()">Inicio de sesión rápido</button>

<p id="msg">Esta función no está disponible.</p>

<div class="signup">
¿No tienes cuenta? <span onclick="reloadWithTransition()">Regístrate</span>
</div>

</div>

<div id="reloadOverlay"></div>

<script>
function reloadWithTransition() {
const overlay = document.getElementById("reloadOverlay");
overlay.style.opacity = "1";
setTimeout(() => location.reload(), 400);
}

function login() {
const error = document.getElementById("error");
error.style.display = "none";
setTimeout(() => error.style.display = "block", 800);
}

function showMessage() {
document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
